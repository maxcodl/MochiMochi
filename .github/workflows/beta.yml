name: Mochi Beta 

on:
  push:
    branches:
      - beta
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Mochi Beta 
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('Android/gradle/wrapper/gradle-wrapper.properties', 'Android/**/*.gradle', 'Android/**/*.gradle.kts') }}
          restore-keys: gradle-

      - name: Grant execute permission for gradlew
        run: chmod +x Android/gradlew

      - name: Decode keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > Android/app/mochimochi-release.jks

      - name: Build signed release APK
        working-directory: Android
        env:
          KEYSTORE_FILE: ${{ github.workspace }}/Android/app/mochimochi-release.jks
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: ./gradlew assembleRelease --no-daemon

      - name: Generate build info
        id: buildinfo
        run: |
          SHORT_SHA=$(git rev-parse --short HEAD)
          BUILD_DATE=$(date +"%Y%m%d-%H%M")
          APK_NAME="MochiMochi-Beta-${BUILD_DATE}-${SHORT_SHA}.apk"

          cp Android/app/build/outputs/apk/release/app-release.apk "$APK_NAME"

          echo "apk_name=$APK_NAME" >> $GITHUB_OUTPUT
          echo "tag=beta-${BUILD_DATE}" >> $GITHUB_OUTPUT

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: MochiMochi-Beta
          path: ${{ steps.buildinfo.outputs.apk_name }}

      - name: Create Beta Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.buildinfo.outputs.tag }}
          name: Beta Build ${{ github.sha }}
          prerelease: true
          generate_release_notes: false
          files: |
            ${{ steps.buildinfo.outputs.apk_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}